<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Model Viewer — AI 3D Modeling</title>
  <style>
    :root {
      --bg: #1a1b1e;
      --panel: #25272c;
      --text: #e8e8eb;
      --muted: #9097a3;
      --accent: #7aa7ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--panel);
      border-bottom: 1px solid #33353c;
    }
    header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
    }
    header h1 strong {
      color: var(--text);
      font-weight: 600;
    }
    header nav a {
      color: var(--accent);
      text-decoration: none;
      margin-left: 1rem;
      font-size: 0.9rem;
    }
    header nav a:hover { text-decoration: underline; }

    main {
      flex: 1;
      display: flex;
      align-items: stretch;
      justify-content: center;
      min-height: 0;
    }
    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: var(--bg);
      background: var(--bg);
    }
    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
      color: var(--muted);
    }
    .empty code {
      background: var(--panel);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      color: var(--text);
    }
    footer {
      padding: 0.5rem 1.25rem;
      background: var(--panel);
      border-top: 1px solid #33353c;
      color: var(--muted);
      font-size: 0.8rem;
      display: flex;
      gap: 1.5rem;
    }
    footer kbd {
      background: #33353c;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.75rem;
      color: var(--text);
    }
  </style>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
  <header>
    <h1 id="title">3D viewer · <strong id="model-name">no model loaded</strong></h1>
    <nav>
      <a href="../">README</a>
      <a id="github-link" href="https://github.com/harteWired/ai-3d-modeling" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </header>

  <main id="viewport"></main>

  <footer>
    <span><kbd>drag</kbd> orbit</span>
    <span><kbd>shift+drag</kbd> pan</span>
    <span><kbd>scroll</kbd> zoom</span>
    <span style="margin-left:auto"><a id="download-link" href="#" style="color:var(--accent); text-decoration:none;">↓ Download GLB</a></span>
  </footer>

  <script>
    const params = new URLSearchParams(location.search);
    const modelPath = params.get("model");
    const viewport = document.getElementById("viewport");
    const nameEl = document.getElementById("model-name");
    const downloadLink = document.getElementById("download-link");

    if (!modelPath) {
      viewport.innerHTML = `
        <div class="empty">
          <h2>No model specified</h2>
          <p>Pass a model URL via the <code>?model=</code> query parameter, e.g.</p>
          <p><code>viewer.html?model=../designs/ptouch-cradle/output/cradle.glb</code></p>
        </div>`;
    } else {
      const safe = encodeURI(modelPath);
      const display = modelPath.split("/").pop().replace(/\.glb$/i, "");
      nameEl.textContent = display;
      document.title = `${display} · 3D Viewer`;
      downloadLink.href = safe;
      downloadLink.setAttribute("download", "");

      const mv = document.createElement("model-viewer");
      mv.setAttribute("src", safe);
      mv.setAttribute("alt", `${display} 3D model`);
      mv.setAttribute("camera-controls", "");
      mv.setAttribute("auto-rotate", "");
      mv.setAttribute("auto-rotate-delay", "5000");
      mv.setAttribute("rotation-per-second", "10deg");
      mv.setAttribute("shadow-intensity", "1");
      mv.setAttribute("exposure", "1.1");
      mv.setAttribute("environment-image", "neutral");
      mv.setAttribute("ar", "");
      mv.setAttribute("ar-modes", "webxr scene-viewer quick-look");
      viewport.appendChild(mv);
    }
  </script>
</body>
</html>
